name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@11.5.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Add Cargo to PATH on Windows
        if: runner.os == 'Windows'
        run: echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: cargo --version
      - run: npm install --package-lock-only --omit=optional --ignore-scripts
      - run: cargo build --release --manifest-path native/Cargo.toml --target ${{ matrix.target }}
      - run: node scripts/build-native-bin.js
        env:
          TARGET: ${{ matrix.target }}
          SKIP_CARGO_BUILD: "1"
      - run: node scripts/build-native-package.js
        env:
          npm_config_platform: ${{ matrix.platform }}
          npm_config_arch: ${{ matrix.arch }}
      - name: Publish platform package
        shell: bash
        working-directory: npm/${{ matrix.platform }}-${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="@agent-ssh-cli/${{ matrix.platform }}-${{ matrix.arch }}"
          npm publish --provenance --access public || \
            if [ "$(npm view "${PACKAGE}@${VERSION}" version 2>/dev/null || true)" = "${VERSION}" ]; then
              echo "${PACKAGE}@${VERSION} already published"
            else
              exit 1
            fi

  publish-main:
    needs: publish-platform
    runs-on: ubuntu-24.04
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@11.5.1
      - run: npm install --package-lock-only --omit=optional --ignore-scripts
      - name: Publish main package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm publish --provenance --access public || \
            if [ "$(npm view "agent-ssh-cli@${VERSION}" version 2>/dev/null || true)" = "${VERSION}" ]; then
              echo "agent-ssh-cli@${VERSION} already published"
            else
              exit 1
            fi

  create-release:
    needs: publish-main
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_MESSAGE="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" | sed '/-----BEGIN PGP SIGNATURE-----/,$d' | sed '${/^$/d;}')"
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            EXISTING_NOTES="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body // ""')"
            if [ -n "${TAG_MESSAGE}" ] && ! grep -Fq "${TAG_MESSAGE}" <<<"${EXISTING_NOTES}"; then
              {
                printf '%s\n' "${EXISTING_NOTES}"
                [ -n "${EXISTING_NOTES}" ] && printf '\n'
                printf '%s\n' "${TAG_MESSAGE}"
              } > release-notes.md
              gh release edit "${GITHUB_REF_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                --notes-file release-notes.md \
                --latest
            else
              gh release edit "${GITHUB_REF_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                --latest
            fi
          elif [ -n "${TAG_MESSAGE}" ]; then
            printf '%s\n' "${TAG_MESSAGE}" > release-notes.md
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          fi
