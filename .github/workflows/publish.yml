name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Add Cargo to PATH on Windows
        if: runner.os == 'Windows'
        run: echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: cargo --version
      - run: npm ci
      - run: cargo build --release --manifest-path native/Cargo.toml --target ${{ matrix.target }}
      - run: node scripts/build-native-bin.js
        env:
          TARGET: ${{ matrix.target }}
          SKIP_CARGO_BUILD: "1"
      - run: node scripts/build-native-package.js
        env:
          npm_config_platform: ${{ matrix.platform }}
          npm_config_arch: ${{ matrix.arch }}
      - run: npm publish --provenance --access public
        working-directory: npm/${{ matrix.platform }}-${{ matrix.arch }}

  publish-main:
    needs: publish-platform
    runs-on: ubuntu-24.04
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --provenance --access public
